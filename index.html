<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIM'S CLUB</title>

<!-- OG 메타태그 -->
<meta property="og:title" content="KIM'S CLUB Hub">
<meta property="og:description" content="킴스클럽 통합 업무 포털입니다.">
<meta property="og:type" content="website">

<!-- 파비콘 -->
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --black:#0d0d0d; --white:#fff;
    --g50:#f5f5f3; --g100:#ececea; --g200:#ddddd8; --g400:#999990; --g600:#555550;
    --radius:16px;
  }
  body { font-family:'Noto Sans KR','Pretendard',sans-serif; background:var(--white); color:var(--black); min-height:100vh; -webkit-font-smoothing:antialiased; }

  /* NAV — 좌우 여백 넉넉하게, 하단 라인 더 섬세하게 */
  nav { position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--g200);z-index:100; }
  .nav-logo img { height:32px;display:block; }
  .nav-admin-btn { padding:8px 20px;border-radius:999px;border:1px solid #ccc;background:transparent;color:var(--black);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:400;cursor:pointer;letter-spacing:.2px;transition:background .15s,color .15s,border-color .15s; }
  .nav-admin-btn:hover { background:var(--black);color:var(--white);border-color:var(--black); }

  /* HERO — 수직 중심 리듬, 자간 세밀하게 */
  .hero { padding-top:160px;padding-bottom:36px;text-align:center; }
  .hero-title { font-family:'DM Sans','Noto Sans KR',sans-serif;font-size:clamp(36px,5vw,58px);font-weight:300;line-height:1.1;letter-spacing:-1.5px;color:#0d0d0d;margin-bottom:16px;opacity:0;transform:translateY(20px);animation:fadeUp .6s cubic-bezier(.22,1,.36,1) forwards .06s; }
  .hero-sub { font-size:13.5px;color:var(--g400);font-weight:300;letter-spacing:.4px;line-height:1.6;opacity:0;animation:fadeUp .6s cubic-bezier(.22,1,.36,1) forwards .18s; }

  /* GRID — 카드 비율 황금비 느낌으로, 테두리 정교하게 */
  .grid-wrap { max-width:680px;margin:28px auto 0;padding:0 28px 120px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;opacity:0;animation:fadeUp .6s cubic-bezier(.22,1,.36,1) forwards .3s; }
  .card { position:relative;background:var(--g50);border-radius:var(--radius);aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--g100);padding:20px;gap:6px;transition:border-color .2s,transform .22s,box-shadow .22s; }
  .card:hover { border-color:var(--g200);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.07); }
  .card.featured { background:var(--g50);color:var(--black);border-color:var(--g100); }
  .card.featured:hover { border-color:var(--g200);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.07); }
  .card-label { font-size:24px;font-weight:700;letter-spacing:-.6px;line-height:1.2;margin-bottom:5px; }
  .card-desc { font-size:12px;color:var(--g400);font-weight:300;letter-spacing:.1px;line-height:1.5; }
  .card.featured .card-desc { color:var(--g400); }
  .card-badge { position:absolute;top:16px;right:16px;background:var(--black);color:var(--white);font-size:9px;font-weight:600;padding:3px 8px;border-radius:999px;letter-spacing:.6px; }

  /* 서브메뉴 */
  .sub-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.28);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center; }
  .sub-overlay.open { display:flex;animation:fadeIn .2s ease; }
  .sub-box { background:var(--white);border-radius:22px;padding:32px;width:min(440px,92vw);border:1px solid var(--g200);box-shadow:0 32px 80px rgba(0,0,0,.12);max-height:80vh;overflow-y:auto; }
  .sub-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:24px; }
  .sub-title { font-size:17px;font-weight:600;letter-spacing:-.4px; }
  .sub-close { width:28px;height:28px;border-radius:50%;border:1px solid var(--g200);background:transparent;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g400);transition:background .12s,color .12s; }
  .sub-close:hover { background:var(--g100);color:var(--black); }
  .sub-list { display:flex;flex-direction:column;gap:6px; }
  .sub-item { display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-radius:12px;background:var(--g50);border:1px solid transparent;cursor:pointer;transition:background .15s,border-color .15s; }
  .sub-item:hover { background:var(--g100);border-color:var(--g200); }
  .si-left { display:flex;flex-direction:column;gap:3px; }
  .si-name { font-size:14px;font-weight:600;letter-spacing:-.3px; }
  .si-desc { font-size:11px;color:var(--g400);font-weight:300; }
  .si-arrow { font-size:12px;color:var(--g400); }
  .sub-divider { height:1px;background:var(--g100);margin:6px 0; }
  .sub-group-label { font-size:10px;font-weight:500;color:var(--g400);letter-spacing:.7px;text-transform:uppercase;padding:10px 4px 6px; }

  /* 관리자 모달 */
  .adm-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);backdrop-filter:blur(10px);z-index:500;align-items:center;justify-content:center; }
  .adm-overlay.open { display:flex;animation:fadeIn .2s ease; }
  .adm-box { background:var(--white);border-radius:22px;padding:32px;width:min(520px,94vw);border:1px solid var(--g200);box-shadow:0 16px 60px rgba(0,0,0,.1);max-height:88vh;overflow-y:auto; }
  .adm-head { display:flex;align-items:center;justify-content:space-between;margin-bottom:24px; }
  .adm-title { font-size:16px;font-weight:600;letter-spacing:-.3px; }
  .adm-close { width:28px;height:28px;border-radius:50%;border:1px solid var(--g200);background:transparent;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g400);transition:background .12s; }
  .adm-close:hover { background:var(--g100);color:var(--black); }

  .adm-section { margin-bottom:24px; }
  .adm-section-title { font-size:10px;font-weight:500;color:var(--g400);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px; }
  .adm-item-row { display:flex;align-items:center;gap:8px;margin-bottom:8px;background:var(--g50);border-radius:10px;padding:10px 12px;border:1px solid var(--g100); }
  .adm-item-col { display:flex;flex-direction:column;gap:5px;flex:1; }
  .adm-inp { padding:7px 10px;border-radius:7px;border:1px solid var(--g200);background:var(--white);font-size:12px;font-family:inherit;outline:none;width:100%;transition:border-color .12s; }
  .adm-inp:focus { border-color:var(--black); }
  .adm-inp-name { font-weight:600; }
  .adm-del-btn { width:26px;height:26px;border-radius:50%;border:1px solid var(--g200);background:transparent;color:var(--g400);font-size:13px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s; }
  .adm-del-btn:hover { background:#fef2f2;color:#dc2626;border-color:#fecaca; }
  .adm-add-btn { width:100%;padding:9px;border-radius:9px;border:1px dashed var(--g200);background:transparent;color:var(--g400);font-size:12px;font-weight:400;cursor:pointer;font-family:inherit;transition:border-color .13s,color .13s; }
  .adm-add-btn:hover { border-color:var(--black);color:var(--black); }

  .adm-actions { display:flex;gap:8px;margin-top:20px; }
  .adm-btn { flex:1;padding:11px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .13s,opacity .13s; }
  .adm-btn-cancel { border:1px solid var(--g200);background:var(--white);color:var(--g600); }
  .adm-btn-cancel:hover { background:var(--g50); }
  .adm-btn-save { border:none;background:var(--black);color:var(--white); }
  .adm-btn-save:hover { opacity:.85; }

  /* 로그인 */
  .pw-inp { width:100%;padding:11px 16px;border-radius:10px;border:1px solid var(--g200);background:var(--g50);font-size:14px;font-family:inherit;outline:none;letter-spacing:2px;margin-bottom:10px;transition:border-color .12s; }
  .pw-inp:focus { border-color:var(--black);background:var(--white); }
  .pw-err { color:#dc2626;font-size:12px;min-height:18px;margin-bottom:10px; }

  /* 토스트 */
  .toast { position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--black);color:var(--white);padding:10px 22px;border-radius:999px;font-size:12px;font-weight:400;letter-spacing:.1px;opacity:0;pointer-events:none;transition:all .25s cubic-bezier(.22,1,.36,1);z-index:999;white-space:nowrap; }
  .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }

  @keyframes fadeUp { to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><img id="logoImg" alt="KIM'S CLUB"></div>
  <button class="nav-admin-btn" onclick="openAdminModal()">관리자 모드</button>
</nav>

<div class="hero">
  <h1 class="hero-title">Kim's Club<br>Hub</h1>
  <p class="hero-sub">킴스클럽 통합 업무 포털입니다.</p>
</div>

<div class="grid-wrap" id="mainGrid">
  <!-- JS로 렌더링 -->
</div>

<!-- 서브메뉴 오버레이 -->
<div class="sub-overlay" id="subOverlay" onclick="closeSub(event)">
  <div class="sub-box">
    <div class="sub-header">
      <div class="sub-title" id="subTitle"></div>
      <button class="sub-close" onclick="closeSubBtn()">✕</button>
    </div>
    <div class="sub-list" id="subList"></div>
  </div>
</div>

<!-- 관리자 모달 -->
<div class="adm-overlay" id="admOverlay" onclick="closeAdmOutside(event)" onmousedown="event.stopPropagation()">
  <div class="adm-box" onmousedown="event.stopPropagation()" onclick="event.stopPropagation()">

    <!-- 로그인 -->
    <div id="admLogin">
      <div class="adm-head">
        <div class="adm-title">관리자 모드</div>
        <button class="adm-close" onclick="closeAdminModal()">✕</button>
      </div>
      <div style="font-size:13px;color:var(--g400);font-weight:300;margin-bottom:20px;">비밀번호를 입력하세요</div>
      <input id="admPwInp" class="pw-inp" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')tryAdminLogin()"/>
      <div id="admPwErr" class="pw-err"></div>
      <div style="display:flex;gap:8px;">
        <button class="adm-btn adm-btn-cancel" onclick="closeAdminModal()">취소</button>
        <button class="adm-btn adm-btn-save" onclick="tryAdminLogin()">로그인</button>
      </div>
    </div>

    <!-- 편집기 -->
    <div id="admEditor" style="display:none;">
      <div class="adm-head">
        <div class="adm-title">메뉴 관리</div>
        <button class="adm-close" onclick="closeAdminModal()">✕</button>
      </div>
      <div id="admSections"></div>
      <div class="adm-actions">
        <button class="adm-btn adm-btn-cancel" onclick="closeAdminModal()">닫기</button>
        <button class="adm-btn adm-btn-save" onclick="saveAll()">저장</button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

// 기본 데이터
const DEFAULT_DATA = {
  menus: [
    {
      id: 'product', label: '상품', desc: '상품 관리', featured: false,
      items: []
    },
    {
      id: 'sales', label: '영업', desc: '표준화 · 도면', featured: true,
      items: [
        { id: 's1', name: '52주 AI 표준화', desc: '도면 · 평당매출 · 운영맵', url: 'index_header_v2_v5_fixed.html' },
        { id: 's2', name: '매출 분석', desc: '지점별 매출 현황 및 리포트', url: '' },
        { id: 's3', name: '발주 관리', desc: '주간 발주 계획 및 현황', url: '' },
      ]
    },
    {
      id: 'marketing', label: '광고·알리기', desc: '광고 · 홍보', featured: false,
      items: []
    },
  ]
};

function loadData() {
  try {
    const s = localStorage.getItem('kc_data');
    return s ? JSON.parse(s) : DEFAULT_DATA;
  } catch(e) { return DEFAULT_DATA; }
}
function saveData(data) {
  localStorage.setItem('kc_data', JSON.stringify(data));
}

// ── 메인 그리드 렌더 ──
function renderGrid() {
  const data = loadData();
  const grid = document.getElementById('mainGrid');
  grid.innerHTML = data.menus.map(m => `
    <div class="card${m.featured?' featured':''}" onclick="handleCardClick('${m.id}')">
      
      <div class="card-label">${m.label}</div>
      <div class="card-desc">${m.desc}</div>
    </div>
  `).join('');
}

function handleCardClick(id) {
  const data = loadData();
  const menu = data.menus.find(m => m.id === id);
  if (!menu) return;
  if (menu.items && menu.items.length > 0) {
    openSub(menu);
  } else if (menu.url) {
    window.open(menu.url, '_blank');
  } else {
    showToast('준비 중입니다');
  }
}

// ── 서브메뉴 ──
function openSub(menu) {
  document.getElementById('subTitle').textContent = menu.label;
  document.getElementById('subList').innerHTML = menu.items.map(item => `
    <div class="sub-item" onclick="goUrl('${item.url}')">
      <div class="si-left">
        <div class="si-name">${item.name}</div>
        <div class="si-desc">${item.desc}</div>
      </div>
      <div class="si-arrow">→</div>
    </div>
  `).join('<div class="sub-divider"></div>');
  document.getElementById('subOverlay').classList.add('open');
}
function closeSubBtn() { document.getElementById('subOverlay').classList.remove('open'); }
function closeSub(e) { if(e.target===document.getElementById('subOverlay')) closeSubBtn(); }
function goUrl(url) {
  if (url) window.open(url, '_blank');
  else showToast('준비 중입니다');
}

// ── 관리자 모달 ──
function openAdminModal() {
  document.getElementById('admOverlay').classList.add('open');
  document.getElementById('admLogin').style.display = 'block';
  document.getElementById('admEditor').style.display = 'none';
  document.getElementById('admPwInp').value = '';
  document.getElementById('admPwErr').textContent = '';
  setTimeout(() => document.getElementById('admPwInp').focus(), 100);
}
function closeAdminModal() { document.getElementById('admOverlay').classList.remove('open'); }
function closeAdmOutside(e) { if(e.target===document.getElementById('admOverlay')) closeAdminModal(); }

function tryAdminLogin() {
  if (document.getElementById('admPwInp').value === ADMIN_PW) {
    document.getElementById('admLogin').style.display = 'none';
    document.getElementById('admEditor').style.display = 'block';
    renderAdminEditor();
  } else {
    document.getElementById('admPwErr').textContent = '비밀번호가 올바르지 않습니다';
    document.getElementById('admPwInp').value = '';
    document.getElementById('admPwInp').focus();
  }
}

// ── 관리자 편집기 렌더 ──
function renderAdminEditor() {
  const d = getEditData();
  const wrap = document.getElementById('admSections');
  wrap.innerHTML = d.menus.map((menu, mi) => `
    <div class="adm-section">
      <div class="adm-section-title">${menu.label} 카드</div>
      <div class="adm-item-row" style="margin-bottom:14px;">
        <div class="adm-item-col">
          <input class="adm-inp adm-inp-name" placeholder="카드 이름" value="${menu.label}"
            oninput="_editData.menus[${mi}].label=this.value"/>
          <input class="adm-inp" placeholder="카드 설명" value="${menu.desc}"
            oninput="_editData.menus[${mi}].desc=this.value"/>
        </div>
      </div>

      ${(menu.groups||[]).map((grp, gi) => `
        <div style="border:1px solid var(--g200);border-radius:10px;padding:12px;margin-bottom:10px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
            <input class="adm-inp adm-inp-name" placeholder="그룹 이름" value="${grp.name}"
              oninput="_editData.menus[${mi}].groups[${gi}].name=this.value" style="flex:1;"/>
            <button class="adm-del-btn" style="background:#fef2f2;color:#dc2626;border-color:#fecaca;"
              onmousedown="event.preventDefault();event.stopPropagation();deleteGroup(${mi},${gi})">✕</button>
          </div>

          ${(grp.items||[]).map((item, ii) => `
            <div class="adm-item-row" style="background:var(--white);">
              <div class="adm-item-col">
                <input class="adm-inp adm-inp-name" placeholder="이름" value="${item.name}"
                  oninput="_editData.menus[${mi}].groups[${gi}].items[${ii}].name=this.value"/>
                <input class="adm-inp" placeholder="설명" value="${item.desc}"
                  oninput="_editData.menus[${mi}].groups[${gi}].items[${ii}].desc=this.value"/>
                <input class="adm-inp" placeholder="URL" value="${item.url}"
                  oninput="_editData.menus[${mi}].groups[${gi}].items[${ii}].url=this.value"/>
              </div>
              <button class="adm-del-btn" onmousedown="event.preventDefault();event.stopPropagation();deleteGroupItem(${mi},${gi},${ii})">✕</button>
            </div>
          `).join('')}

          <button class="adm-add-btn" onmousedown="event.preventDefault();event.stopPropagation();addGroupItem(${mi},${gi})">+ 링크 추가</button>
        </div>
      `).join('')}

      <button class="adm-add-btn" style="margin-top:4px;" onmousedown="event.preventDefault();event.stopPropagation();addGroup(${mi})">+ 그룹 추가</button>
    </div>
    ${mi < d.menus.length-1 ? '<div class="sub-divider" style="margin:4px 0 20px;"></div>' : ''}
  `).join('');
}

// 임시 편집 데이터 (저장 전)
let _editData = null;

  function deleteGroup(mi, gi) {
    getEditData().menus[mi].groups.splice(gi, 1);
    renderAdminEditor();
  }
  function addGroup(mi) {
    const d = getEditData();
    if (!d.menus[mi].groups) d.menus[mi].groups = [];
    d.menus[mi].groups.push({ id: 'g'+Date.now(), name: '새 그룹', items: [] });
    renderAdminEditor();
  }
  function deleteGroupItem(mi, gi, ii) {
    getEditData().menus[mi].groups[gi].items.splice(ii, 1);
    renderAdminEditor();
  }
  function addGroupItem(mi, gi) {
    const d = getEditData();
    d.menus[mi].groups[gi].items.push({ id: 'i'+Date.now(), name: '', desc: '', url: '' });
    renderAdminEditor();
  }

function getEditData() {
  if (!_editData) _editData = JSON.parse(JSON.stringify(loadData()));
  return _editData;
}

function updateMenuField(mi, field, val) {
  getEditData().menus[mi][field] = val;
}
function updateItemField(mi, ii, field, val) {
  getEditData().menus[mi].items[ii][field] = val;
}
function deleteItem(mi, ii) {
  getEditData().menus[mi].items.splice(ii, 1);
  renderAdminEditor();
}
function addItem(mi) {
  const d = getEditData();
  d.menus[mi].items.push({ id: 'i'+Date.now(), name: '', desc: '', url: '' });
  renderAdminEditor();
}
function saveAll() {
  if (_editData) {
    saveData(_editData);
    _editData = null;
  }
  renderGrid();
  closeAdminModal();
  showToast('저장되었습니다');
}

// ── 토스트 ──
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── 초기화 ──
document.getElementById('logoImg').src = 'data:image/png;base64,' + LOGO_B64;
renderGrid();
</script>
