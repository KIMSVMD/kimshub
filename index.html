<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>킴스클럽 간편식 성과 관리 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1917;
  --text2: #6b6a65;
  --text3: #9b9a94;
  --red: #c0392b; --red-bg: #fdf0ef; --red-border: #f5c6c2;
  --amber: #a0610a; --amber-bg: #fef6e7; --amber-border: #f9d89a;
  --green: #2d6a1f; --green-bg: #eef6e8; --green-border: #b8dda0;
  --blue: #1a4f8a; --blue-bg: #eaf2fb; --blue-border: #a8cdf0;
  --radius: 10px; --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
}
.page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px 60px;
}
.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border2);
}
.header-left h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.header-left p {
  font-size: 12px;
  color: var(--text2);
  margin-top: 4px;
  font-family: 'DM Mono', monospace;
}
.tab-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.tab {
  padding: 7px 16px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  font-size: 13px;
  cursor: pointer;
  background: var(--surface);
  color: var(--text2);
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
  font-weight: 400;
}
.tab:hover { background: var(--surface2); color: var(--text); }
.tab.active {
  background: var(--text);
  color: #fff;
  border-color: var(--text);
  font-weight: 500;
}
.metric-row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.metric-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.3px; font-family: 'DM Mono', monospace; }
.metric-value { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.card-title { font-size: 11px; color: var(--text3); margin-bottom: 12px; letter-spacing: 0.3px; font-family: 'DM Mono', monospace; }
.bar-wrap { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { width: 72px; font-size: 11px; color: var(--text2); text-align: right; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 10px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.bar-val { width: 40px; font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace; }
.full-card { margin-bottom: 16px; }
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th { text-align: left; color: var(--text3); font-weight: 400; padding: 6px 8px; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 11px; }
.tbl td { padding: 7px 8px; border-bottom: 1px solid var(--border); }
.tbl tr:last-child td { border-bottom: none; }
.badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
.b-good { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.b-mid  { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
.b-bad  { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.b-info { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }

.issue-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; margin-bottom: 16px; }
.issue-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.issue-store { font-size: 12px; font-weight: 700; color: var(--text); padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.issue-item { display: flex; flex-direction: column; gap: 2px; }
.issue-tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; display: inline-block; margin-bottom: 1px; font-weight: 500; width: fit-content; }
.t-urgent { background: var(--red-bg); color: var(--red); }
.t-warn { background: var(--amber-bg); color: var(--amber); }
.t-info { background: var(--blue-bg); color: var(--blue); }
.issue-cat { font-size: 11px; font-weight: 500; color: var(--text); }
.issue-desc { font-size: 10px; color: var(--text2); line-height: 1.4; }

.matrix-grid {
  display: grid;
  grid-template-columns: 36px 1fr 1fr;
  grid-template-rows: auto auto auto;
  gap: 8px;
}
.m-label { font-size: 11px; color: var(--text3); text-align: center; padding: 4px; font-family: 'DM Mono', monospace; }
.m-axis { display: flex; align-items: center; justify-content: center; writing-mode: vertical-rl; transform: rotate(180deg); font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }
.m-cell { border-radius: var(--radius-sm); padding: 12px; display: flex; flex-direction: column; gap: 5px; }
.m-cell-title { font-size: 10px; font-weight: 700; margin-bottom: 4px; }
.mc-pill { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 3px; display: inline-block; width: fit-content; margin-top: 1px; }
.mc-red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.mc-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
.mc-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.mc-gray { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

.section-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 24px 0 16px;
}
.section-divider-label { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; }
.section-divider-line { flex: 1; height: 1px; background: var(--border2); }

.plan-block { margin-bottom: 14px; }
.plan-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-radius: var(--radius) var(--radius) 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
}
.ph-red { background: var(--red-bg); }
.ph-amber { background: var(--amber-bg); }
.ph-blue { background: var(--blue-bg); }
.plan-header-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
.phb-red { background: var(--red); color: #fff; }
.phb-amber { background: var(--amber); color: #fff; }
.phb-blue { background: var(--blue); color: #fff; }
.plan-header-title { font-size: 13px; font-weight: 700; color: var(--text); }
.plan-header-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
.plan-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0 0 var(--radius) var(--radius);
  overflow: hidden;
}
.plan-tbl { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
.plan-tbl th { background: var(--surface2); text-align: left; color: var(--text3); font-weight: 400; padding: 7px 10px; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 10px; }
.plan-tbl td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
.plan-tbl tr:last-child td { border-bottom: none; }
.plan-tbl tr:hover td { background: var(--surface2); }
.plan-rank { font-size: 13px; font-weight: 700; color: var(--text3); font-family: 'DM Mono', monospace; }
.plan-store-pill { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; display: inline-block; }
.plan-issue-main { font-size: 12px; font-weight: 500; color: var(--text); }
.plan-issue-sub { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
.plan-action-cell { background: var(--surface2); border-radius: var(--radius-sm); padding: 7px 9px; font-size: 11px; color: var(--text); line-height: 1.5; }
.plan-when { font-size: 11px; color: var(--text2); text-align: right; font-family: 'DM Mono', monospace; white-space: nowrap; }
.plan-when.urgent { color: var(--red); font-weight: 500; }
.plan-when.soon { color: var(--amber); font-weight: 500; }

.action-section { margin-bottom: 14px; }
.action-section-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.action-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-green { background: var(--green); }
.dot-red { background: var(--red); }
.dot-amber { background: var(--amber); }
.action-item { display: flex; gap: 10px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--border); }
.action-item:last-child { border-bottom: none; }
.action-text { font-size: 12px; color: var(--text); line-height: 1.5; }
.action-tag { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }

.diag-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
.diag-item:last-child { border-bottom: none; }
.diag-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }

@media (max-width: 700px) {
  .issue-grid { grid-template-columns: repeat(2, 1fr); }
  .row2 { grid-template-columns: 1fr; }
  .metric-row { grid-template-columns: 1fr 1fr; }
  .plan-tbl th:nth-child(4), .plan-tbl td:nth-child(4) { display: none; }
  .matrix-grid { grid-template-columns: 28px 1fr 1fr; }
}
</style>
</head>

function rateColor(v) {
  if (v >= 30) return '#2d6a1f';
  if (v >= 25) return '#1a4f8a';
  if (v >= 20) return '#a0610a';
  return '#c0392b';
}
function rateLabel(v) {
  if (v >= 30) return ['b-good','우수'];
  if (v >= 25) return ['b-mid','양호'];
  return ['b-bad','요주의'];
}
function storePill(s, small) {
  const fs = small ? '10px' : '11px';
  return `<span class="plan-store-pill" style="background:${storeBg[s]||'#f0efe9'};color:${storeColors[s]||'#1a1917'};font-size:${fs}">${s}</span>`;
}

function barRows(items, maxKey, valKey, colorFn, fixedColor) {
  const max = Math.max(...items.map(i => i[maxKey]));
  return items.map(i => {
    if (i[valKey] === 0) return `<div class="bar-row"><div class="bar-label">${i.cat||i.name||i.store}</div><div class="bar-track"></div><div class="bar-val" style="color:#9b9a94;font-size:10px">-</div></div>`;
    const pct = (i[valKey] / max * 100).toFixed(1);
    const col = fixedColor || (colorFn ? colorFn(i[valKey]) : '#1a1917');
    return `<div class="bar-row"><div class="bar-label">${i.cat||i.name||i.store||i.s}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div><div class="bar-val" style="color:${col}">${i[valKey]}${valKey==='매총율'?'%':''}</div></div>`;
  }).join('');
}

function mkPlanRows(items) {
  return items.map(r => {
    const isAll = r.store === '전 점포';
    const pill = isAll
      ? `<span style="font-size:11px;font-weight:700;color:#6b6a65">전 점포</span>`
      : storePill(r.store);
    const wClass = r.when.includes('주') ? 'urgent' : r.when.includes('내') ? 'soon' : '';
    return `<tr>
      <td style="width:36px"><span class="plan-rank">${r.rank}</span></td>
      <td style="width:110px">${pill}</td>
      <td><div class="plan-issue-main">${r.issue}</div><div class="plan-issue-sub">${r.sub}</div></td>
      <td style="width:200px"><div class="plan-action-cell">${r.action}</div></td>
      <td style="width:80px"><div class="plan-when ${wClass}">${r.when}</div></td>
    </tr>`;
  }).join('');
}

      <div class="card full-card">
        <div class="card-title">STORE PERFORMANCE SUMMARY</div>
        <table class="tbl"><thead><tr><th>점포</th><th style="text-align:right">매출</th><th style="text-align:right">비중</th><th style="text-align:right">매총율</th><th style="text-align:center">판정</th></tr></thead><tbody>${rows}</tbody></table>
      </div>
      <div class="card full-card">
        <div class="card-title">STORE ISSUE CARDS — 테두리: 빨강 긴급 2건 이상 / 주황 1건 / 초록 양호</div>
        <div class="issue-grid">${issueCards}</div>
      </div>
      <div class="card full-card">
        <div class="card-title">PRIORITY MATRIX — 비중 × 매총율</div>
        ${renderMatrix()}
      </div>
      <div class="section-divider"><div class="section-divider-label">점포별 우선순위 액션 플랜</div><div class="section-divider-line"></div></div>
      ${renderActionPlan()}
    `;
  } else {
    const cats = data[store].categories;
    const sorted = [...cats].sort((a,b) => b.비중 - a.비중);
    const act = data[store].actions;
    const iss = storeIssues[store];

    const catRows = sorted.map(c => {
      if (c.매총율 === 0) return `<tr><td>${c.cat}</td><td colspan="3" style="text-align:center;color:#9b9a94;font-size:11px">미운영</td></tr>`;
      const [cls,lbl] = rateLabel(c.매총율);
      return `<tr><td>${c.cat}</td><td style="text-align:right;font-family:'DM Mono',monospace">${c.비중}%</td><td style="text-align:right;font-family:'DM Mono',monospace;color:${rateColor(c.매총율)};font-weight:700">${c.매총율}%</td><td style="text-align:center"><span class="badge ${cls}">${lbl}</span></td></tr>`;
    }).join('');

    const mkActionItems = (items, dotCls) => items.map(i => `
      <div class="action-item">
        <div class="action-dot ${dotCls}" style="margin-top:5px;flex-shrink:0"></div>
        <div><div class="action-text">${i.text}</div><div class="action-tag">${i.tag}</div></div>
      </div>`).join('');

    const mkDiagItems = (items, dotColor, tagCls, tagLabel) => items.map(i => `
      <div class="diag-item">
        <div class="diag-dot" style="background:${dotColor}"></div>
        <div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span class="issue-tag ${tagCls}">${tagLabel}</span><span style="font-size:12px;font-weight:700">${i.cat}</span></div>
          <div style="font-size:12px;color:#1a1917;line-height:1.5">${i.desc}</div>
        </div>
      </div>`).join('');

    const storePlanItems = [...actionPlan.urgent, ...actionPlan.improve, ...actionPlan.monitor].filter(r => r.store === store);
    const hdr = `<tr><th style="width:36px">#</th><th style="width:110px">점포</th><th>이슈 / 원인</th><th style="width:200px">액션</th><th style="width:80px;text-align:right">시한</th></tr>`;

    el.innerHTML = `
      <div class="metric-row">
        <div class="metric-card"><div class="metric-label">STORE SALES</div><div class="metric-value">${d.매출}</div><div class="metric-sub">단위: 백만원</div></div>
        <div class="metric-card"><div class="metric-label">CHANNEL SHARE</div><div class="metric-value">${d.매출비중}%</div><div class="metric-sub">킴스클럽 내 비중</div></div>
        <div class="metric-card"><div class="metric-label">GROSS MARGIN</div><div class="metric-value" style="color:${rateColor(d.매총율)}">${d.매총율}%</div><div class="metric-sub">${d.매총율>=28?'전체 평균 상회':'개선 필요'}</div></div>
      </div>
      <div class="row2">
        <div class="card"><div class="card-title">CATEGORY SHARE</div><div class="bar-wrap">${sorted.filter(c=>c.비중>0).map(c=>{const pct=(c.비중/sorted.filter(x=>x.비중>0)[0].비중*100).toFixed(1);return`<div class="bar-row"><div class="bar-label">${c.cat}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${storeColors[store]}"></div></div><div class="bar-val">${c.비중}%</div></div>`;}).join('')}</div></div>
        <div class="card"><div class="card-title">CATEGORY MARGIN</div><div class="bar-wrap">${sorted.filter(c=>c.매총율>0).map(c=>{const pct=(c.매총율/50*100).toFixed(1);return`<div class="bar-row"><div class="bar-label">${c.cat}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${rateColor(c.매총율)}"></div></div><div class="bar-val">${c.매총율}%</div></div>`;}).join('')}</div></div>
      </div>
      <div class="card full-card">
        <div class="card-title">CATEGORY DETAIL</div>
        <table class="tbl"><thead><tr><th>카테고리</th><th style="text-align:right">비중</th><th style="text-align:right">매총율</th><th style="text-align:center">판정</th></tr></thead><tbody>${catRows}</tbody></table>
      </div>
      <div class="card full-card">
        <div class="card-title">ISSUE DIAGNOSIS — 빨강 긴급 · 주황 개선 · 파랑 기회</div>
        ${mkDiagItems(iss.urgent,'#c0392b','t-urgent','긴급')}
        ${mkDiagItems(iss.warn,'#a0610a','t-warn','개선')}
        ${mkDiagItems(iss.info,'#1a4f8a','t-info','기회')}
      </div>
      ${storePlanItems.length > 0 ? `
      <div class="plan-block">
        <div class="plan-header ph-red"><span class="plan-header-badge phb-red">액션 플랜</span><div><div class="plan-header-title">${store} 우선 처리 과제</div><div class="plan-header-sub">전체 플랜에서 해당 점포 항목 추출</div></div></div>
        <div class="plan-table-wrap"><table class="plan-tbl"><thead>${hdr}</thead><tbody>${mkPlanRows(storePlanItems)}</tbody></table></div>
      </div>` : ''}
      <div class="card full-card">
        <div class="action-section"><div class="action-section-title"><div class="action-dot dot-green"></div>성과 강화 방향</div>${mkActionItems(act.강화,'dot-green')}</div>
        <div class="action-section"><div class="action-section-title"><div class="action-dot dot-red"></div>개선 조치 필요</div>${mkActionItems(act.개선,'dot-red')}</div>
        <div class="action-section" style="margin-bottom:0"><div class="action-section-title"><div class="action-dot dot-amber"></div>모니터링 항목</div>${mkActionItems(act.모니터링,'dot-amber')}</div>
      </div>
    `;
  }
}

show('전체');
</script>
</body>
</html>
