function fixArrays(obj) {
  if (!obj || typeof obj !== 'object') return obj;
  const keys = Object.keys(obj);
  const isArr = keys.length > 0 && keys.every(k => /^\d+$/.test(k));
  if (isArr) {
    const arr = [];
    keys.sort((a,b) => Number(a)-Number(b)).forEach(k => arr.push(fixArrays(obj[k])));
    return arr;
  }
  const result = {};
  keys.forEach(k => result[k] = fixArrays(obj[k]));
  return result;
}

    if (!s) return JSON.parse(JSON.stringify(DEFAULT_DATA));
    const parsed = JSON.parse(s);
    const fixed = fixArrays(parsed);
    if (!fixed || !Array.isArray(fixed.menus)) return JSON.parse(JSON.stringify(DEFAULT_DATA));
    // groups/items 없으면 기본값 보장
    fixed.menus.forEach(m => {
      if (!m.groups) m.groups = [];
      if (!m.items) m.items = [];
    });
    return fixed;
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}

function saveData(data) { localStorage.setItem('kc_data', JSON.stringify(data)); }

// ── 그리드 렌더 ──
function renderGrid() {
  const data = loadData();
  const grid = document.getElementById('mainGrid');
  grid.innerHTML = data.menus.map(m => `
    <div class="card${m.featured?' featured':''}" onclick="handleCardClick('${m.id}')">
      <div class="card-label">${m.label}</div>
      <div class="card-desc">${m.desc}</div>
    </div>
  `).join('');
  if (data.menus.length === 5) {
    grid.style.gridTemplateColumns = 'repeat(6,1fr)';
    const items = grid.children;
    items[0].style.gridColumn = 'span 2';
    items[1].style.gridColumn = 'span 2';
    items[2].style.gridColumn = 'span 2';
    items[3].style.gridColumn = 'span 3';
    items[4].style.gridColumn = 'span 3';
    // 높이를 첫번째 카드와 동일하게
    const h = items[0].offsetHeight;
    if (h > 0) {
      items[3].style.aspectRatio = 'unset';
      items[3].style.height = h + 'px';
      items[4].style.aspectRatio = 'unset';
      items[4].style.height = h + 'px';
    }
  }
  const items = Array.from(grid.children);
  items.forEach(item => {
    item.style.gridColumn = '';
    item.style.gridRow = '';
    item.style.height = '';
    item.style.aspectRatio = '';
  });
  if (data.menus.length === 5) {
    const mobileTemplate = 'repeat(6,minmax(0,1fr))';
    grid.style.gridTemplateColumns = window.innerWidth <= 768 ? mobileTemplate : 'repeat(6,90px)';
    items[0].style.gridColumn = '1 / span 2';
    items[0].style.gridRow = '1 / span 2';
    items[1].style.gridColumn = '3 / span 2';
    items[1].style.gridRow = '1';
    items[2].style.gridColumn = '5 / span 2';
    items[2].style.gridRow = '1';
    items[3].style.gridColumn = '3 / span 2';
    items[3].style.gridRow = '2';
    items[4].style.gridColumn = '5 / span 2';
    items[4].style.gridRow = '2';
  } else {
    grid.style.gridTemplateColumns = '';
  }
}

function handleCardClick(id) {
  const data = loadData();
  const menu = data.menus.find(m => m.id === id);
  if (!menu) return;
  const hasGroups = menu.groups && menu.groups.length > 0;
  const hasItems = menu.items && menu.items.length > 0;
  if (hasGroups || hasItems) openSub(menu);
  else if (menu.url) window.open(menu.url, '_blank');
  else showToast('준비 중입니다');
}

// ── 서브메뉴 ──
let _currentMenu = null;
function openSub(menu) {
  _currentMenu = menu;
  document.getElementById('subOverlay').classList.add('open');
  if (menu.groups && menu.groups.length > 0) showGroupList(menu);
  else showItemList(menu.label, menu.items || [], null);
}
function showGroupList(menu) {
  document.getElementById('subTitle').textContent = menu.label;
  document.getElementById('subBack').style.display = 'none';
  document.getElementById('subList').innerHTML = menu.groups.map((g, gi) => `
    <div class="sub-item" onclick="openGroup(${gi})">
      <div class="si-left">
        <div class="si-name">${g.name}</div>
        <div class="si-desc">${g.items && g.items.length > 0 ? g.items.length+'개 항목' : '준비 중'}</div>
      </div>
      <div class="si-arrow">→</div>
    </div>
  `).join('<div class="sub-divider"></div>');
}
function openGroup(gi) {
  const grp = _currentMenu.groups[gi];
  showItemList(grp.name, grp.items || [], () => showGroupList(_currentMenu));
}
function showItemList(title, items, backFn) {
  document.getElementById('subTitle').textContent = title;
  const backBtn = document.getElementById('subBack');
  if (backFn) { backBtn.style.display = 'flex'; backBtn.onclick = backFn; }
  else backBtn.style.display = 'none';
  document.getElementById('subList').innerHTML = items.length > 0
    ? items.map(item => `
        <div class="sub-item" onclick="goUrl('${item.url}')">
          <div class="si-left"><div class="si-name">${item.name}</div><div class="si-desc">${item.desc}</div></div>
          <div class="si-arrow">→</div>
        </div>`).join('<div class="sub-divider"></div>')
    : '<div style="padding:16px 4px;font-size:13px;color:var(--g400);text-align:center;">준비 중입니다</div>';
}
function closeSubBtn() { document.getElementById('subOverlay').classList.remove('open'); }
function closeSub(e) { if(e.target===document.getElementById('subOverlay')) closeSubBtn(); }
function goUrl(url) { if(url) window.open(url,'_blank'); else showToast('준비 중입니다'); }

// ── 관리자 ──
function openAdminModal() {
  _editData = null;
  document.getElementById('admOverlay').classList.add('open');
  document.getElementById('admLogin').style.display = 'block';
  document.getElementById('admEditor').style.display = 'none';
  document.getElementById('admPwInp').value = '';
  document.getElementById('admPwErr').textContent = '';
  setTimeout(() => document.getElementById('admPwInp').focus(), 100);
}
function closeAdminModal() { document.getElementById('admOverlay').classList.remove('open'); _editData = null; }
function closeAdmOutside(e) {
  const overlay = document.getElementById('admOverlay');
  const editor = document.getElementById('admEditor');
  const isEditing = editor && editor.style.display !== 'none';
  if (e.target === overlay && !isEditing) closeAdminModal();
}

function toggleAdminPw() {
  const input = document.getElementById('admPwInp');
  if (!input) return;
  input.type = input.type === 'password' ? 'text' : 'password';
}

function enhanceAdminLoginUI() {
  const login = document.getElementById('admLogin');
  const title = login?.querySelector('.adm-title');
  const head = login?.querySelector('.adm-head');
  const closeBtn = login?.querySelector('.adm-close');
  const helper = document.getElementById('admPwErr')?.previousElementSibling;
  const input = document.getElementById('admPwInp');
  const err = document.getElementById('admPwErr');
  const actions = err?.nextElementSibling;
  if (!login || !title || !head || !closeBtn || !helper || !input || !err || !actions) return;

  title.textContent = '관리자 로그인';
  head.appendChild(closeBtn);
  helper.textContent = '비밀번호';
  helper.className = 'adm-login-label';
  input.placeholder = '비밀번호를 입력하세요';

  if (!input.parentElement.classList.contains('pw-wrap')) {
    const wrap = document.createElement('div');
    wrap.className = 'pw-wrap';
    input.parentNode.insertBefore(wrap, input);
    wrap.appendChild(input);

    const toggle = document.createElement('button');
    toggle.type = 'button';
    toggle.className = 'pw-toggle';
    toggle.setAttribute('aria-label', '비밀번호 보기');
    toggle.innerHTML = `
      <svg viewBox="0 0 24 24" aria-hidden="true">

        <circle cx="12" cy="12" r="3"/>
      </svg>

    toggle.onclick = toggleAdminPw;
    wrap.appendChild(toggle);
  }

  actions.className = 'adm-login-actions';
  const buttons = actions.querySelectorAll('.adm-btn');
  if (buttons[0]) buttons[0].textContent = '취소';
  if (buttons[1]) buttons[1].textContent = '로그인';
}

function tryAdminLogin() {
  if (document.getElementById('admPwInp').value === ADMIN_PW) {
    document.getElementById('admLogin').style.display = 'none';
    document.getElementById('admEditor').style.display = 'block';
    _editData = JSON.parse(JSON.stringify(loadData()));
    renderAdminEditor();
  } else {
    document.getElementById('admPwErr').textContent = '비밀번호가 올바르지 않습니다';
    document.getElementById('admPwInp').value = '';
    document.getElementById('admPwInp').focus();
  }
}

let _editData = null;

function renderAdminEditor() {
  if (!_editData) return;
  // Firebase에서 불러온 객체를 배열로 변환 + 없으면 초기화
  _editData = fixArrays(_editData);
  _editData.menus.forEach(m => {
    if (!m.groups || !Array.isArray(m.groups)) m.groups = [];
    if (!m.items || !Array.isArray(m.items)) m.items = [];
    m.groups.forEach(g => { if (!g.items || !Array.isArray(g.items)) g.items = []; });
  });
  const wrap = document.getElementById('admSections');
  wrap.innerHTML = _editData.menus.map((menu, mi) => `
    <div class="adm-section">
      <div class="adm-section-title">${menu.label} 카드</div>
      <div class="adm-item-row" style="margin-bottom:14px;">
        <div class="adm-item-col">
          <input class="adm-inp adm-inp-name" placeholder="카드 이름" value="${menu.label}" oninput="_editData.menus[${mi}].label=this.value"/>
          <input class="adm-inp" placeholder="카드 설명" value="${menu.desc}" oninput="_editData.menus[${mi}].desc=this.value"/>
        </div>
      </div>
      ${(!menu.groups || !Array.isArray(menu.groups) || menu.groups.length === 0) ? `
        <div style="font-size:10px;color:var(--g400);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;">링크 목록</div>
        ${menu.items.map((item, ii) => `
          <div class="adm-item-row">
            <div class="adm-item-col">
              <input class="adm-inp adm-inp-name" placeholder="이름" value="${item.name}" oninput="_editData.menus[${mi}].items[${ii}].name=this.value"/>
              <input class="adm-inp" placeholder="설명" value="${item.desc}" oninput="_editData.menus[${mi}].items[${ii}].desc=this.value"/>
              <input class="adm-inp" placeholder="URL" value="${item.url}" oninput="_editData.menus[${mi}].items[${ii}].url=this.value"/>
            </div>
            <button class="adm-del-btn" onmousedown="event.preventDefault();event.stopPropagation();_editData.menus[${mi}].items.splice(${ii},1);renderAdminEditor()">✕</button>
          </div>`).join('')}
        <button class="adm-add-btn" onmousedown="event.preventDefault();event.stopPropagation();_editData.menus[${mi}].items.push({id:'i'+Date.now(),name:'',desc:'',url:''});renderAdminEditor()">+ 링크 추가</button>
        <button class="adm-add-btn" style="margin-top:6px;" onmousedown="event.preventDefault();event.stopPropagation();_editData.menus[${mi}].groups.push({id:'g'+Date.now(),name:'새 그룹',items:_editData.menus[${mi}].items});_editData.menus[${mi}].items=[];renderAdminEditor()">+ 그룹으로 전환</button>
      ` : `
        ${menu.groups.map((grp, gi) => `
          <div style="border:1px solid var(--g200);border-radius:10px;padding:12px;margin-bottom:10px;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
              <input class="adm-inp adm-inp-name" placeholder="그룹 이름" value="${grp.name}" oninput="_editData.menus[${mi}].groups[${gi}].name=this.value" style="flex:1;"/>
              <button class="adm-del-btn" style="background:#fef2f2;color:#dc2626;border-color:#fecaca;" onmousedown="event.preventDefault();event.stopPropagation();_editData.menus[${mi}].groups.splice(${gi},1);renderAdminEditor()">✕</button>
            </div>
            ${grp.items.map((item, ii) => `
              <div class="adm-item-row" style="background:var(--white);">
                <div class="adm-item-col">
                  <input class="adm-inp adm-inp-name" placeholder="이름" value="${item.name}" oninput="_editData.menus[${mi}].groups[${gi}].items[${ii}].name=this.value"/>
                  <input class="adm-inp" placeholder="설명" value="${item.desc}" oninput="_editData.menus[${mi}].groups[${gi}].items[${ii}].desc=this.value"/>
                  <input class="adm-inp" placeholder="URL" value="${item.url}" oninput="_editData.menus[${mi}].groups[${gi}].items[${ii}].url=this.value"/>
                </div>
                <button class="adm-del-btn" onmousedown="event.preventDefault();event.stopPropagation();_editData.menus[${mi}].groups[${gi}].items.splice(${ii},1);renderAdminEditor()">✕</button>
              </div>`).join('')}
            <button class="adm-add-btn" onmousedown="event.preventDefault();event.stopPropagation();_editData.menus[${mi}].groups[${gi}].items.push({id:'i'+Date.now(),name:'',desc:'',url:''});renderAdminEditor()">+ 링크 추가</button>
          </div>`).join('')}
        <button class="adm-add-btn" onmousedown="event.preventDefault();event.stopPropagation();_editData.menus[${mi}].groups.push({id:'g'+Date.now(),name:'새 그룹',items:[]});renderAdminEditor()">+ 그룹 추가</button>
      `}
    </div>
    ${mi < _editData.menus.length-1 ? '<div class="sub-divider" style="margin:4px 0 20px;"></div>' : ''}
  `).join('');
}

async function saveAll() {
  if (!_editData) return;
  saveData(_editData);
  if (typeof window._fbSaveData === 'function') {
    const ok = await window._fbSaveData(_editData);
    showToast(ok ? '저장되었습니다 ☁' : '로컬 저장됨');
  } else {
    showToast('저장되었습니다');
  }
  _editData = null;
  renderGrid();
  closeAdminModal();
}

// ── 토스트 ──
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('show'), 2000);
}
