<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0d0d0d; --white: #fff;
    --g50: #f7f7f7; --g100: #efefef; --g200: #e0e0e0; --g400: #aaa; --g600: #666;
    --radius: 14px;
  }
  body { font-family:'Noto Sans KR','Pretendard',sans-serif; background:var(--white); color:var(--black); min-height:100vh; -webkit-font-smoothing:antialiased; }

  nav { position:fixed;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--g200);z-index:100; }
  .nav-logo img { height:20px;display:block; }
  .nav-admin-btn { padding:7px 16px;border-radius:999px;border:1.5px solid var(--black);background:transparent;color:var(--black);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:400;cursor:pointer;letter-spacing:-.2px;transition:background .15s,color .15s; }
  .nav-admin-btn:hover { background:var(--black);color:var(--white); }

  .hero { padding-top:148px;padding-bottom:56px;text-align:center; }
  .hero-title { font-family:'DM Sans','Noto Sans KR',sans-serif;font-size:clamp(34px,5.5vw,60px);font-weight:300;line-height:1.15;letter-spacing:-.5px;margin-bottom:14px;opacity:0;transform:translateY(18px);animation:fadeUp .55s ease forwards .08s; }
  .hero-sub { font-size:14px;color:var(--g400);font-weight:300;letter-spacing:.2px;opacity:0;animation:fadeUp .55s ease forwards .2s; }

  .grid-wrap { max-width:660px;margin:48px auto 0;padding:0 24px 100px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;opacity:0;animation:fadeUp .55s ease forwards .32s; }
  .card { position:relative;background:var(--g50);border-radius:var(--radius);aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid transparent;transition:background .16s,border-color .16s,transform .18s,box-shadow .18s;gap:8px; }
  .card:hover { background:var(--g100);border-color:var(--g200);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.06); }
  .card.featured { background:var(--black);color:var(--white);border-color:var(--black); }
  .card.featured:hover { background:#1a1a1a;box-shadow:0 10px 28px rgba(0,0,0,.18); }
  .card-label { font-size:18px;font-weight:700;letter-spacing:-.5px; }
  .card-desc { font-size:11px;color:var(--g400);font-weight:300;letter-spacing:-.1px; }
  .card.featured .card-desc { color:rgba(255,255,255,.4); }
  .card-badge { position:absolute;top:11px;right:11px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;letter-spacing:.4px; }

  /* 서브메뉴 */
  .sub-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center; }
  .sub-overlay.open { display:flex;animation:fadeIn .18s ease; }
  .sub-box { background:var(--white);border-radius:20px;padding:28px;width:min(440px,92vw);box-shadow:0 24px 64px rgba(0,0,0,.15);max-height:80vh;overflow-y:auto; }
  .sub-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:20px; }
  .sub-title { font-size:18px;font-weight:700;letter-spacing:-.5px; }
  .sub-close { width:30px;height:30px;border-radius:50%;border:none;background:var(--g100);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g600);transition:background .12s; }
  .sub-close:hover { background:var(--g200); }
  .sub-list { display:flex;flex-direction:column;gap:8px; }
  .sub-item { display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-radius:11px;background:var(--g50);border:1.5px solid transparent;cursor:pointer;transition:background .13s,border-color .13s,transform .13s; }
  .sub-item:hover { background:var(--g100);border-color:var(--g200);transform:translateX(3px); }
  .si-left { display:flex;flex-direction:column;gap:3px; }
  .si-name { font-size:14px;font-weight:700;letter-spacing:-.3px; }
  .si-desc { font-size:11px;color:var(--g400); }
  .si-arrow { font-size:13px;color:var(--g400); }
  .sub-divider { height:1px;background:var(--g200);margin:4px 0; }

  /* 관리자 모달 */
  .adm-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(8px);z-index:500;align-items:center;justify-content:center; }
  .adm-overlay.open { display:flex;animation:fadeIn .18s ease; }
  .adm-box { background:var(--white);border-radius:20px;padding:32px;width:min(520px,94vw);box-shadow:0 8px 40px rgba(0,0,0,.12);max-height:88vh;overflow-y:auto; }

  .adm-title { font-size:17px;font-weight:700;letter-spacing:-.4px; }
  .adm-close { width:30px;height:30px;border-radius:50%;border:none;background:var(--g100);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g600); }
  .adm-close:hover { background:var(--g200); }

  .adm-section { margin-bottom:20px; }
  .adm-section-title { font-size:10px;font-weight:600;color:var(--g400);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px; }
  .adm-item-row { display:flex;align-items:center;gap:8px;margin-bottom:8px;background:var(--g50);border-radius:10px;padding:10px 12px; }
  .adm-item-col { display:flex;flex-direction:column;gap:5px;flex:1; }
  .adm-inp { padding:7px 10px;border-radius:7px;border:1.5px solid var(--g200);background:var(--white);font-size:12px;font-family:inherit;outline:none;width:100%; }
  .adm-inp:focus { border-color:#0d0d0d; }
  .adm-inp-name { font-weight:600; }
  .adm-del-btn { width:26px;height:26px;border-radius:50%;border:none;background:var(--g100);color:var(--g600);font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center; }
  .adm-del-btn:hover { background:#fee2e2;color:#dc2626; }
  .adm-add-btn { width:100%;padding:9px;border-radius:9px;border:1.5px dashed var(--g200);background:transparent;color:var(--g400);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:border-color .13s,color .13s; }
  .adm-add-btn:hover { border-color:var(--black);color:var(--black); }

  .adm-actions { display:flex;gap:8px;margin-top:20px; }
  .adm-btn { flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .13s; }
  .adm-btn-cancel { border:1.5px solid var(--g200);background:var(--white);color:var(--black); }
  .adm-btn-save { border:none;background:var(--black);color:var(--white); }

  /* 로그인 */
  .pw-inp { width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid var(--g200);background:var(--g50);font-size:14px;font-family:inherit;outline:none;letter-spacing:2px;margin-bottom:10px; }
  .pw-err { color:#e53935;font-size:12px;min-height:18px;margin-bottom:10px; }

  /* 토스트 */
  .toast { position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--black);color:var(--white);padding:10px 20px;border-radius:999px;font-size:12px;font-weight:500;opacity:0;pointer-events:none;transition:all .22s;z-index:999;white-space:nowrap; }
  .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }

  @keyframes fadeUp { to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>

function loadData() {
  try {
    const s = localStorage.getItem('kc_data');
    return s ? JSON.parse(s) : DEFAULT_DATA;
  } catch(e) { return DEFAULT_DATA; }
}
function saveData(data) {
  localStorage.setItem('kc_data', JSON.stringify(data));
}

// ── 메인 그리드 렌더 ──
function renderGrid() {
  const data = loadData();
  const grid = document.getElementById('mainGrid');
  grid.innerHTML = data.menus.map(m => `
    <div class="card${m.featured?' featured':''}" onclick="handleCardClick('${m.id}')">
      ${m.featured ? '<div class="card-badge">LIVE</div>' : ''}
      <div class="card-label">${m.label}</div>
      <div class="card-desc">${m.desc}</div>
    </div>
  `).join('');
}

function handleCardClick(id) {
  const data = loadData();
  const menu = data.menus.find(m => m.id === id);
  if (!menu) return;
  if (menu.items && menu.items.length > 0) {
    openSub(menu);
  } else if (menu.url) {
    window.open(menu.url, '_blank');
  } else {
    showToast('준비 중입니다');
  }
}

// ── 서브메뉴 ──
function openSub(menu) {
  document.getElementById('subTitle').textContent = menu.label;
  document.getElementById('subList').innerHTML = menu.items.map(item => `
    <div class="sub-item" onclick="goUrl('${item.url}')">
      <div class="si-left">
        <div class="si-name">${item.name}</div>
        <div class="si-desc">${item.desc}</div>
      </div>
      <div class="si-arrow">→</div>
    </div>
  `).join('<div class="sub-divider"></div>');
  document.getElementById('subOverlay').classList.add('open');
}
function closeSubBtn() { document.getElementById('subOverlay').classList.remove('open'); }
function closeSub(e) { if(e.target===document.getElementById('subOverlay')) closeSubBtn(); }
function goUrl(url) {
  if (url) window.open(url, '_blank');
  else showToast('준비 중입니다');
}

// ── 관리자 모달 ──
function openAdminModal() {
  document.getElementById('admOverlay').classList.add('open');
  document.getElementById('admLogin').style.display = 'block';
  document.getElementById('admEditor').style.display = 'none';
  document.getElementById('admPwInp').value = '';
  document.getElementById('admPwErr').textContent = '';
  setTimeout(() => document.getElementById('admPwInp').focus(), 100);
}
function closeAdminModal() { document.getElementById('admOverlay').classList.remove('open'); }
function closeAdmOutside(e) { if(e.target===document.getElementById('admOverlay')) closeAdminModal(); }

function tryAdminLogin() {
  if (document.getElementById('admPwInp').value === ADMIN_PW) {
    document.getElementById('admLogin').style.display = 'none';
    document.getElementById('admEditor').style.display = 'block';
    renderAdminEditor();
  } else {
    document.getElementById('admPwErr').textContent = '비밀번호가 올바르지 않습니다';
    document.getElementById('admPwInp').value = '';
    document.getElementById('admPwInp').focus();
  }
}

// ── 관리자 편집기 렌더 ──
function renderAdminEditor() {
  const data = loadData();
  const wrap = document.getElementById('admSections');
  wrap.innerHTML = data.menus.map((menu, mi) => `
    <div class="adm-section">
      <div class="adm-section-title">${menu.label} 메뉴</div>

      <!-- 카드 기본 정보 -->
      <div class="adm-item-row" style="margin-bottom:12px;">
        <div class="adm-item-col">
          <input class="adm-inp adm-inp-name" placeholder="카드 이름" value="${menu.label}"
            onchange="updateMenuField(${mi},'label',this.value)"/>
          <input class="adm-inp" placeholder="카드 설명" value="${menu.desc}"
            onchange="updateMenuField(${mi},'desc',this.value)"/>
          ${menu.items.length===0 ? `<input class="adm-inp" placeholder="바로가기 URL (항목 없을 때)" value="${menu.url||''}"
            onchange="updateMenuField(${mi},'url',this.value)"/>` : ''}
        </div>
      </div>

      <!-- 세부 항목들 -->
      ${menu.items.map((item, ii) => `
        <div class="adm-item-row" id="item_${mi}_${ii}">
          <div class="adm-item-col">
            <input class="adm-inp adm-inp-name" placeholder="항목 이름" value="${item.name}"
              onchange="updateItemField(${mi},${ii},'name',this.value)"/>
            <input class="adm-inp" placeholder="설명" value="${item.desc}"
              onchange="updateItemField(${mi},${ii},'desc',this.value)"/>
            <input class="adm-inp" placeholder="URL" value="${item.url}"
              onchange="updateItemField(${mi},${ii},'url',this.value)"/>
          </div>
          <button class="adm-del-btn" onclick="deleteItem(${mi},${ii})">✕</button>
        </div>
      `).join('')}

      <button class="adm-add-btn" onclick="addItem(${mi})">+ 항목 추가</button>
    </div>
    ${mi < data.menus.length-1 ? '<div class="sub-divider" style="margin:4px 0 20px;"></div>' : ''}
  `).join('');
}

// 임시 편집 데이터 (저장 전)
let _editData = null;
function getEditData() {
  if (!_editData) _editData = JSON.parse(JSON.stringify(loadData()));
  return _editData;
}

function updateMenuField(mi, field, val) {
  getEditData().menus[mi][field] = val;
}
function updateItemField(mi, ii, field, val) {
  getEditData().menus[mi].items[ii][field] = val;
}
function deleteItem(mi, ii) {
  getEditData().menus[mi].items.splice(ii, 1);
  renderAdminEditor();
}
function addItem(mi) {
  const d = getEditData();
  d.menus[mi].items.push({ id: 'i'+Date.now(), name: '', desc: '', url: '' });
  renderAdminEditor();
}
function saveAll() {
  if (_editData) {
    saveData(_editData);
    _editData = null;
  }
  renderGrid();
  closeAdminModal();
  showToast('저장되었습니다');
}

// ── 토스트 ──
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── 초기화 ──
document.getElementById('logoImg').src = 'data:image/png;base64,' + LOGO_B64;
renderGrid();
</script>
</body>
</html>
